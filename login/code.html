<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-fixed/30 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-tertiary-fixed/20 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Login Container -->
<main class="w-full max-w-md z-10">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-20 h-20 mb-6 relative">
<div class="absolute inset-0 bg-primary rounded-2xl rotate-3 opacity-10"></div>
<div class="bg-primary-container w-full h-full rounded-2xl flex items-center justify-center shadow-lg border border-primary-container/20">
<span class="material-symbols-outlined text-tertiary-fixed text-4xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary mb-2">
                Bem-vindo de volta
            </h1>
<p class="text-on-surface-variant font-medium text-sm max-w-[280px] leading-relaxed">
                Informe seu e-mail ou telefone para receber seu código de acesso
            </p>
</div>
<!-- Interactive Form Area -->
<section class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_20px_40px_rgba(21,28,39,0.06)] border border-outline-variant/10">
<!-- Email Input Group -->
<div class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant ml-1" for="contact">Identificação</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-medium text-on-surface placeholder:text-outline/60 outline-none" id="contact" placeholder="email@exemplo.com" type="text"/>
<button class="absolute inset-y-2 right-2 px-4 bg-primary text-on-primary text-xs font-bold rounded-md hover:bg-primary-container transition-all active:scale-95">
                            Enviar código
                        </button>
</div>
</div>
<!-- OTP Section (Simulated Active State) -->
<div class="space-y-4 pt-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant">Código de 6 dígitos</label>
<span class="text-[10px] font-bold text-tertiary-fixed-dim bg-tertiary-container/30 px-2 py-0.5 rounded-full">Aguardando...</span>
</div>
<div class="flex justify-between gap-2">
<input class="otp-input-box w-12 h-14 bg-surface-container-low border-2 border-transparent text-center text-xl font-bold text-primary rounded-lg focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input-box w-12 h-14 bg-surface-container-low border-2 border-transparent text-center text-xl font-bold text-primary rounded-lg focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input-box w-12 h-14 bg-surface-container-low border-2 border-transparent text-center text-xl font-bold text-primary rounded-lg focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input-box w-12 h-14 bg-surface-container-low border-2 border-transparent text-center text-xl font-bold text-primary rounded-lg focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input-box w-12 h-14 bg-surface-container-low border-2 border-transparent text-center text-xl font-bold text-primary rounded-lg focus:outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="otp-input-box w-12 h-14 bg-surface-container-low border-2 border-transparent text-center text-xl font-bold text-primary rounded-lg focus:outline-none transition-all" maxlength="1" type="text" value=""/>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-lg shadow-lg hover:shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4">
                    Confirmar acesso
                    <span class="material-symbols-outlined text-xl">login</span>
</button>
<!-- Timer & Resend Link -->
<div class="text-center pt-2">
<p class="text-sm font-medium text-on-surface-variant">
                        Não recebeu o código? 
                        <a class="text-primary font-bold hover:underline decoration-tertiary-fixed-dim decoration-2 underline-offset-4 ml-1" href="#">Reenviar código</a>
<span class="block mt-2 text-[11px] font-bold text-outline uppercase tracking-widest">(60s)</span>
</p>
</div>
</div>
</section>
<!-- Illustration / Mood Decor -->
<div class="mt-12 flex justify-center gap-8 opacity-40">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">security</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-outline">Seguro</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">speed</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-outline">Rápido</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">shield_person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter text-outline">Privado</span>
</div>
</div>

<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-high/50 backdrop-blur-sm rounded-full border border-outline-variant/20">
